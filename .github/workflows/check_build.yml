name: Build check
on:
  push:
    paths:
      - src/**/*
      - build.gradle
      - gradle.properties
      - settings.gradle
  pull_request:
    paths:
      - src/**/*
      - build.gradle
      - gradle.properties
      - settings.gradle
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      mod-release: false
      upload-artifacts: false
